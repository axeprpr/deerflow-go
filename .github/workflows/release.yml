name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version used for archive names
        required: false
        default: 0.1.0
  push:
    tags:
      - "v*"

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run compatibility tests
        run: |
          go test -count=1 -run 'TestParseJSONStringListAcceptsChoicesWrapper|TestSetupAgentToolCreatesAgentFromRuntimeContext|TestSetupAgentToolStoresCreatedAgentNameInThreadState|TestUploadPlainTextDocumentCreatesMarkdownCompanion|TestConvertToMessagesInjectsUploadedFilesBlockAndPreservesKwargs|TestConvertToMessagesKeepsAttachmentOnlyUserMessage|TestConvertToMessagesNormalizesUploadedFilePathAndSkipsMissingFiles|TestMessagesToLangChainReturnsMultiContentWhenAvailable|TestThreadJoinStreamFollowsLatestActiveRunOnly|TestValidateThreadIDRejectsDots|TestLangGraphRoutesRejectThreadIDsWithDots|TestGatewayRoutesRejectThreadIDsWithDots|TestThreadRunPersistsModeFromConfig|TestThreadRunPersistsModeFromTopLevelContext|TestThreadConfigurableDerivesBooleansFromMode' ./pkg/langgraphcompat
          go test ./cmd/langgraph

      - name: Build release artifacts
        env:
          VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          version="${VERSION#refs/tags/}"
          version="${version#v}"
          VERSION="$version" make release

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deerflow-go-release
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
