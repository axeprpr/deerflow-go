version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SILICON_FLOW_API_KEY: ${SILICON_FLOW_API_KEY:?SILICON_FLOW_API_KEY is required}
      POSTGRES_URL: postgres://postgres:password@db:5432/deerflow?sslmode=disable
      DEFAULT_LLM_MODEL: ${DEFAULT_LLM_MODEL:-qwen/Qwen3.5-9B}
      PORT: 8080
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: deerflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d deerflow"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  ui:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install -g pnpm && pnpm install && pnpm dev --hostname 0.0.0.0 --port 3000"
    environment:
      NEXT_PUBLIC_LANGGRAPH_BASE_URL: http://api:8080
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ../deerflow-ui/frontend:/app
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
