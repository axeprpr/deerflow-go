version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:?SILICONFLOW_API_KEY is required}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///data/deerflow.db}
      DEFAULT_LLM_MODEL: ${DEFAULT_LLM_MODEL:-qwen/Qwen3.5-9B}
      PORT: 8080
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "8080:8080"
    volumes:
      - deerflow_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  ui:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install -g pnpm && pnpm install && pnpm dev --hostname 0.0.0.0 --port 3000"
    environment:
      NEXT_PUBLIC_LANGGRAPH_BASE_URL: http://api:8080
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./third_party/deerflow-ui/frontend:/app
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  deerflow_data:
